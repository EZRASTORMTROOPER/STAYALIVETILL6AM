<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Night Shift MVP</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="ui-layer">
      <div id="hud">
        <div id="clock">12:00 AM</div>
        <div id="power">Power: 100%</div>
      </div>
      <aside id="instructions">
        <h2>Night Shift Controls</h2>
        <ul>
          <li><strong>A / D</strong> or <strong>← / →</strong>: Look left and right</li>
          <li><strong>F</strong> or <strong>Space</strong>: Toggle flashlight</li>
          <li>Shine light on the intruder when they appear.</li>
          <li>Survive until <strong>6:00 AM</strong>.</li>
        </ul>
        <p>The intruder may appear around 2, 3, 4, and 5 AM.</p>
      </aside>
      <div id="status-banner"></div>
    </div>
    <canvas id="game-canvas"></canvas>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
